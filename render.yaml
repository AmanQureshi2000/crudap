services:
  - type: web
    name: todo-app
    runtime: docker
    repo: https://github.com/AmanQureshi2000/crudap
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: todo-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: todo-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: todo-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: todo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: todo-db
          property: password

databases:
  - name: todo-db
    databaseName: todo_db
    user: todo_user